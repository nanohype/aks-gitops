{{- range $sa := list "historical" "overlord" "broker" "kafka-client" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: druid-{{ $sa }}
  labels:
    {{- include "common.labels" $ | indent 4 }}
    azure.workload.identity/use: "true"
  annotations:
    {{- include "common.annotations" $ | indent 4 }}
    {{- with (index $.Values.serviceAccounts (printf "druid-%s" $sa)) }}
    {{- if .clientId }}
    azure.workload.identity/client-id: {{ .clientId | quote }}
    {{- end }}
    {{- end }}
{{- end }}
