apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - appName: cert-manager
                  namespace: cert-manager
                  chartRepo: https://charts.jetstack.io
                  chart: cert-manager
                  chartVersion: v1.19.3
                  path: addons/bootstrap/cert-manager
                  syncWave: "0"
                - appName: external-secrets
                  namespace: external-secrets
                  chartRepo: https://charts.external-secrets.io
                  chart: external-secrets
                  chartVersion: "0.17.0"
                  path: addons/bootstrap/external-secrets
                  syncWave: "0"
                - appName: prometheus-operator-crds
                  namespace: monitoring
                  chartRepo: https://prometheus-community.github.io/helm-charts
                  chart: prometheus-operator-crds
                  chartVersion: "19.1.0"
                  path: addons/bootstrap/prometheus-operator-crds
                  syncWave: "0"
                # metrics-server intentionally NOT deployed on AKS — the
                # AKS managed-addons subsystem auto-installs its own
                # metrics-server Deployment + Service in kube-system as part
                # of cluster creation (visible in `helm list -n kube-system`
                # as one of the `aks-managed-*` releases). Trying to layer
                # our own metrics-server on top creates a Service-selector
                # tug-of-war: AKS keeps the Service's selector at
                # `k8s-app=metrics-server` with `targetPort: ms-https`, our
                # chart wants `app.kubernetes.io/name=metrics-server` with
                # `targetPort: https`. The resulting Service has no
                # endpoints (selector doesn't match either set of pods) and
                # the APIService /apis/metrics.k8s.io fails health.
                # The addon directory is kept for parity with eks/gke
                # siblings (EKS/GKE need it), but it's omitted here.
                - appName: reloader
                  namespace: reloader
                  chartRepo: https://stakater.github.io/stakater-charts
                  chart: reloader
                  chartVersion: "2.2.5"
                  path: addons/bootstrap/reloader
                  syncWave: "2"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      sources:
        - repoURL: '{{ .chartRepo }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .chartVersion }}'
          helm:
            releaseName: '{{ .appName }}'
            valueFiles:
              - $values/{{ .path }}/values.yaml
              - $values/{{ .path }}/values-{{ index .metadata.labels "environment" }}.yaml
        - repoURL: https://github.com/nanohype/aks-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jsonPointers:

            - /webhooks/0/clientConfig/caBundle
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:

            - /webhooks/0/clientConfig/caBundle
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ServerSideDiff=true
          - Replace=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
