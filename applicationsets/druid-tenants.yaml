apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: druid-tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - git:
              repoURL: https://github.com/nanohype/aks-gitops.git
              revision: main
              directories:
                - path: 'catalog/druid/tenants/*'
  template:
    metadata:
      name: 'druid-{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/sync-wave: "50"
    spec:
      project: platform
      sources:
        - repoURL: https://github.com/nanohype/aks-gitops.git
          targetRevision: main
          path: catalog/druid/chart
          helm:
            releaseName: '{{ .path.basename }}'
            valueFiles:
              - $values/catalog/druid/values.yaml
              - $values/{{ .path.path }}/values.yaml
              - $values/{{ .path.path }}/values-{{ index .metadata.labels "environment" }}.yaml
        - repoURL: https://github.com/nanohype/aks-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: 'druid-{{ .path.basename }}'
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jsonPointers:

            - /webhooks/0/clientConfig/caBundle
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:

            - /webhooks/0/clientConfig/caBundle
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ServerSideDiff=true
          - Replace=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
