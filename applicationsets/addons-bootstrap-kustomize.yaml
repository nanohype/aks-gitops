apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-bootstrap-kustomize
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - appName: external-secrets-stores
                  namespace: external-secrets
                  path: addons/bootstrap/external-secrets-stores
                  syncWave: "1"
                # storage-classes intentionally NOT deployed on AKS.
                # AKS ships `default`, `managed`, `managed-csi`,
                # `managed-csi-premium`, `managed-premium`, plus the azurefile
                # tiers — these are pre-populated by the AKS managed-addons
                # subsystem with the in-tree-style parameters (`storageaccounttype`,
                # `kind`, `cachingmode`) routed through `disk.csi.azure.com`.
                # StorageClass.parameters is an immutable field, so any attempt
                # to redefine `managed` or `managed-premium` from this repo
                # fails server-side with `Forbidden: updates to parameters are
                # forbidden`. The aks-gitops/addons/bootstrap/storage-classes
                # directory is kept for parity with eks/gke variants, but is
                # not synced on AKS.
                - appName: priority-classes
                  namespace: kube-system
                  path: addons/bootstrap/priority-classes
                  syncWave: "2"
  template:
    metadata:
      name: '{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/nanohype/aks-gitops.git
        targetRevision: main
        path: '{{ .path }}/overlays/{{ index .metadata.labels "environment" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jsonPointers:

            - /webhooks/0/clientConfig/caBundle
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:

            - /webhooks/0/clientConfig/caBundle
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ServerSideDiff=true
          - Replace=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
