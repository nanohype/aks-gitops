# External Grafana CR — does NOT deploy a Grafana pod. Instead the
# grafana-operator pushes Dashboards/DataSources to the managed Grafana
# instance using the API token in the referenced Secret.
#
# overlays/{env}/grafana-patch.yaml sets spec.external.url to the
# environment's Azure Managed Grafana endpoint.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: external
  labels:
    dashboards: external
spec:
  external:
    url: https://placeholder.grafana.azure.com  # patched per-env
    apiKey:
      name: grafana-external-credentials
      key: token
  config: {}
