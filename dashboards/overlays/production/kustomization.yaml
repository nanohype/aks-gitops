apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/external/url
        value: https://production-aks-grafana.cuw.grafana.azure.com
    target:
      kind: Grafana
      name: external
  - patch: |-
      - op: replace
        path: /spec/datasource/url
        value: https://production-aks-amw.westus2.prometheus.monitor.azure.com
    target:
      kind: GrafanaDatasource
      name: managed-prometheus
