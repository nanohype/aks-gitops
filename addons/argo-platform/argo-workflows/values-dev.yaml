# Argo Workflows - Dev overrides
# Single replica, dev artifact storage

server:
  replicas: 1
  serviceAccount:
    labels:
      azure.workload.identity/use: "true"
    annotations:
      azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

artifactRepository:
  azure:
    endpoint: https://aksdevartifacts.blob.core.windows.net
    container: argo-artifacts
