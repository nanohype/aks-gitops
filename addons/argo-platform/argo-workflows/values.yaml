# Argo Workflows - Workflow orchestration

server:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
  workflowDefaults:
    spec:
      ttlStrategy:
        secondsAfterCompletion: 86400
        secondsAfterSuccess: 43200
        secondsAfterFailure: 172800

useDefaultArtifactRepo: true
artifactRepository:
  azure:
    endpoint: https://accountname.blob.core.windows.net
    container: argo-artifacts
    accountKeySecret:
      name: argo-workflows-azure
      key: account-key
