apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: karpenter.sh/v1
      kind: NodePool
      metadata:
        name: default
      spec:
        template:
          spec:
            requirements:
              - key: karpenter.sh/capacity-type
                operator: In
                values: ["spot", "on-demand"]
              - key: kubernetes.io/arch
                operator: In
                values: ["amd64"]
              - key: kubernetes.io/os
                operator: In
                values: ["linux"]
              - key: karpenter.azure.com/sku-family
                operator: In
                values: ["D", "E", "F", "L"]
              - key: karpenter.azure.com/sku-cpu
                operator: In
                values: ["4", "8", "16", "32"]
        limits:
          cpu: 200
          memory: 400Gi
        disruption:
          budgets:
            # Default: allow 10% disruption
            - nodes: "10%"
            # No disruptions during business hours (9am-5pm UTC, Mon-Fri)
            - nodes: "0"
              schedule: "0 9 * * 1-5"
              duration: 8h
    target:
      kind: NodePool
      name: default

  - patch: |-
      apiVersion: karpenter.azure.com/v1beta1
      kind: AKSNodeClass
      metadata:
        name: default
      spec:
        tags:
          environment: prod
          managed-by: karpenter
    target:
      kind: AKSNodeClass
      name: default

configMapGenerator:
  - name: karpenter-config
    literals:
      - CLUSTER_NAME=prod-aks
      - ENVIRONMENT=prod
