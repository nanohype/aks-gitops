# KEDA - Dev overrides
# Single replicas for cost

serviceAccount:
  operator:
    labels:
      azure.workload.identity/use: "true"
    annotations:
      azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

operator:
  replicaCount: 1

metricsServer:
  replicaCount: 1

webhooks:
  replicaCount: 1
