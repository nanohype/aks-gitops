# Velero - Dev overrides
# Dev: backups disabled, no node agent, no backup locations

serviceAccount:
  server:
    labels:
      azure.workload.identity/use: "true"
    annotations:
      azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

configuration:
  backupStorageLocation: []
  volumeSnapshotLocation: []

deployNodeAgent: false

schedules:
  daily:
    disabled: true
  weekly:
    disabled: true
