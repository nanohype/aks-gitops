# Cilium base configuration (Azure / BYOCNI)
# Environment-specific values are in values-{env}.yaml

# Azure IPAM via Cilium - cluster must be created with --network-plugin=none (BYOCNI)
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList: ["10.244.0.0/16"]
    clusterPoolIPv4MaskSize: 24

routingMode: tunnel
tunnelProtocol: vxlan
kubeProxyReplacement: true
endpointRoutes:
  enabled: true

# Hubble observability (enabled globally)
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"

# mTLS encryption
encryption:
  enabled: true
  type: wireguard

# Network policies
policyEnforcementMode: default

# BPF settings
bpf:
  preallocateMaps: true

# Tolerations for system nodes
operator:
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

tolerations:
  - operator: Exists
