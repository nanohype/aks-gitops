# Grafana Agent - Production overrides
#
# AMW_REMOTE_WRITE_URL = DCE.logs_ingestion_endpoint + /dataCollectionRules/
# DCR.immutable_id + /streams/Microsoft-PrometheusMetrics/api/v1/write. Both
# halves come from the landing-zone managed-monitoring component
# (`terragrunt output amw_remote_write_url`). Update this whenever the DCE
# or DCR is recreated — the immutable_id changes on replacement.

serviceAccount:
  annotations:
    azure.workload.identity/client-id: "e6f45e78-ba7f-45f5-bdbf-5937d083202b"

extraEnv:
  - name: AMW_REMOTE_WRITE_URL
    value: "https://prod-aks-amw-dce-4vpk.westus2-1.ingest.monitor.azure.com/dataCollectionRules/dcr-b8d36469219f4998bc0a933eac390cfe/streams/Microsoft-PrometheusMetrics/api/v1/write"
  - name: CLUSTER_NAME
    value: "prod-aks"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
