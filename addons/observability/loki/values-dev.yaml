# Loki - Dev overrides
# Dev: single replica, shorter retention, smaller storage

serviceAccount:
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

loki:
  commonConfig:
    replication_factor: 1
  limits_config:
    retention_period: 168h

singleBinary:
  replicas: 1
  persistence:
    size: 10Gi
