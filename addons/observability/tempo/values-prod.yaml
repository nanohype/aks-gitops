# Tempo - prod env overrides
#
# Workload Identity is wired up (the UAMI has Storage Blob Data Contributor
# on the tempo storage account), but the chart's trace backend stays on the
# default filesystem/PVC path for now. The `tempo` chart in single-binary
# mode expects a specific volume layout that conflicts with switching to
# Azure Blob — moving traces into Blob is a follow-up that needs the
# `tempo-distributed` chart.

serviceAccount:
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: "5ea3e62e-f3b7-49e5-b4dd-c167d0af31fa"

tempo:
  podLabels:
    azure.workload.identity/use: "true"
  retention: 720h

persistence:
  size: 100Gi
